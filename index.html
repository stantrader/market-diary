<script>
    async function renderSortedDashboard() {
        try {
            const r = await fetch(`data.json?t=${Date.now()}`);
            if (!r.ok) throw new Error("Данные не найдены");
            
            // ИСПРАВЛЕНИЕ ДЛЯ SAFARI:
            // Вместо r.json() читаем как текст и чистим от NaN
            const rawText = await r.text();
            const cleanText = rawText.replace(/: NaN/g, ': 1.0');
            const json = JSON.parse(cleanText);
            
            document.getElementById('update-date').innerText = "Last Update: " + json.last_update + " (UTC)";
            const db = document.getElementById('dashboard');
            db.innerHTML = '';

            Object.entries(json.payload).forEach(([groupName, tickers]) => {
                const head = document.createElement('div');
                head.className = 'group-title';
                head.innerText = groupName;
                db.appendChild(head);

                const sortedTickers = Object.entries(tickers).sort((a, b) => {
                    // Добавляем проверку на случай пустых массивов
                    const sumA = (a[1].data || []).reduce((acc, val) => acc + (val || 1.0), 0);
                    const sumB = (b[1].data || []).reduce((acc, val) => acc + (val || 1.0), 0);
                    return sumB - sumA;
                });

                sortedTickers.forEach(([symbol, info]) => {
                    const row = document.createElement('div');
                    row.className = 'row';
                    row.innerHTML = `
                        <div class="ticker-box">
                            <span class="ticker-symbol">${symbol}</span>
                            <span class="ticker-name">${info.name}</span>
                        </div>`;

                    const chart = document.createElement('div');
                    chart.className = 'chart-container';

                    (info.data || []).forEach(v => {
                        const val = v || 1.0; // Защита от null
                        const b = document.createElement('div');
                        b.className = 'bar';
                        
                        let h = ((val - 0.98) / (1.02 - 0.98)) * 100;
                        b.style.height = '2px';
                        b.style.backgroundColor = val >= 1.0 ? 'var(--up-color)' : 'var(--down-color)';
                        b.title = `RS: ${val}`;
                        chart.appendChild(b);

                        setTimeout(() => {
                            b.style.height = Math.min(Math.max(h, 5), 100) + '%';
                        }, 150);
                    });
                    
                    row.appendChild(chart);
                    db.appendChild(row);
                });
            });
        } catch(e) { 
            console.error(e);
            document.getElementById('dashboard').innerHTML = `<div class="loading" style="color:var(--down-color)">Ошибка: ${e.message}</div>`;
        }
    }
    window.onload = renderSortedDashboard;
</script>
