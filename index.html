<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Relative Strength</title>
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc;
            --text-dim: #94a3b8; --accent: #ff9800; --up-color: #22c55e;
            --down-color: #ef4444; --grid-line: #334155;
        }
        body { font-family: sans-serif; background: var(--bg-color); color: var(--text-main); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; background: var(--card-bg); padding: 25px; border-radius: 12px; }
        .group-title { color: var(--accent); font-size: 16px; margin: 35px 0 15px 0; border-bottom: 1px solid var(--grid-line); padding-bottom: 5px; }
        
        /* Увеличенная колонка под Тизер + Название */
        .row { display: grid; grid-template-columns: 220px 1fr; align-items: center; gap: 10px; margin-bottom: 8px; }
        .ticker-box { display: flex; flex-direction: column; }
        .ticker-symbol { font-weight: bold; font-size: 14px; }
        .ticker-name { font-size: 11px; color: var(--text-dim); }
        
        .chart-container { display: flex; align-items: flex-end; height: 32px; gap: 2px; border-left: 2px solid var(--grid-line); padding-left: 5px; }
        .bar { flex: 1; min-width: 4px; border-radius: 1px; transition: height 0.5s; }
        .loading { text-align: center; padding: 40px; color: var(--text-dim); }
        footer { margin-top: 30px; font-size: 11px; text-align: center; color: var(--text-dim); }
        @media (max-width: 600px) { .row { grid-template-columns: 140px 1fr; } .ticker-name { display: none; } }
    </style>
</head>
<body>
<div class="container">
    <h2 style="margin:0">Market Relative Strength</h2>
    <div id="update-date" style="font-size:12px; color:var(--text-dim); margin-bottom:20px;">Загрузка...</div>
    <div id="dashboard"><div class="loading">Синхронизация...</div></div>
    <footer>Данные: Yahoo Finance | Последние 20 торговых дней</footer>
</div>

<script>
    async function load() {
        try {
            const r = await fetch(`data.json?t=${Date.now()}`);
            const json = await r.json();
            document.getElementById('update-date').innerText = "Update: " + json.last_update + " UTC";
            const db = document.getElementById('dashboard');
            db.innerHTML = '';

            Object.entries(json.payload).forEach(([groupName, tickers]) => {
                const head = document.createElement('div');
                head.className = 'group-title';
                head.innerText = groupName;
                db.appendChild(head);

                Object.entries(tickers).forEach(([symbol, info]) => {
                    const row = document.createElement('div');
                    row.className = 'row';
                    
                    // Блок названия
                    row.innerHTML = `
                        <div class="ticker-box">
                            <span class="ticker-symbol">${symbol}</span>
                            <span class="ticker-name">${info.name}</span>
                        </div>`;

                    const chart = document.createElement('div');
                    chart.className = 'chart-container';

                    info.data.forEach(v => {
                        const b = document.createElement('div');
                        b.className = 'bar';
                        let h = ((v - 0.98) / (1.02 - 0.98)) * 100;
                        b.style.height = Math.min(Math.max(h, 5), 100) + '%';
                        b.style.backgroundColor = v >= 1.0 ? 'var(--up-color)' : 'var(--down-color)';
                        b.title = `RS: ${v}`;
                        chart.appendChild(b);
                    });
                    row.appendChild(chart);
                    db.appendChild(row);
                });
            });
        } catch(e) { console.error(e); }
    }
    window.onload = load;
</script>
</body>
</html>
