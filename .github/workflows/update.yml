name: Daily ETF Sync

on:
  schedule:
    # 11:30 UTC — это 12:30 сейчас и 13:30 со следующей недели по Испании.
    # Идеально, чтобы успеть погулять с собакой и подготовить идеи к открытию.
    - cron: '30 11 * * 1-5'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install yfinance

      - name: Run Script
        run: python update_data.py

      - name: Commit and Push Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          git commit -m "Pre-market update for Spain session" || exit 0
          git push origin main
